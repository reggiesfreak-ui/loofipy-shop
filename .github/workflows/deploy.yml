name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm install
      
      - name: Lint code
        run: |
          if [ -f .eslintrc.js ]; then npm run lint; fi
      
      - name: Run tests
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then npm test; fi
        env:
          NODE_ENV: test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      
      - name: Install dependencies
        run: npm install --production
      
      - name: Deploy to Railway
        if: env.RAILWAY_API_TOKEN != ''
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --service loofipy-backend
      
      - name: Deploy to Render
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST ${{ env.RENDER_DEPLOY_HOOK }}
      
      - name: Notify Deployment
        if: success()
        run: echo "✅ Deployment successful!"
      
      - name: Report Error
        if: failure()
        run: echo "❌ Deployment failed!"
